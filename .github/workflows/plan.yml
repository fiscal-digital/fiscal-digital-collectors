name: Terraform Plan + Lint + Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  packages: read

# Serializa runs que tocam o terraform state remoto deste repo
# (state separado do monorepo via key dedicada — ver terraform/backend.tf).
concurrency:
  group: terraform-state-collectors-prod
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fiscal-digital'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (no-op enquanto nao houver collector)
        run: npm run build

      # ─── Pipeline de infra (precisa de secrets) ──────────────────────────
      # Steps abaixo NAO rodam em PR de fork: secrets nao sao expostos a
      # forks por design de seguranca do GitHub Actions. PR de fork passa
      # com lint + typecheck + test (acima); pipeline terraform fica para
      # PR interno. Ver LRN-20260523-003 no monorepo.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --format=compact --minimum-failure-severity=error

      - name: Run checkov
        # skip_check espelha o monorepo fiscal-digital — TODO de hardening progressivo.
        # Resources afetados: Lambdas (code-signing), CloudWatch log groups (KMS encrypt,
        # retention 1y). Sincronizar com lista do monorepo quando ele remover algum.
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: >-
            CKV_AWS_18,
            CKV_AWS_21,
            CKV_AWS_28,
            CKV_AWS_50,
            CKV_AWS_68,
            CKV_AWS_86,
            CKV_AWS_115,
            CKV_AWS_116,
            CKV_AWS_117,
            CKV_AWS_144,
            CKV_AWS_145,
            CKV_AWS_158,
            CKV_AWS_173,
            CKV_AWS_258,
            CKV_AWS_259,
            CKV_AWS_272,
            CKV_AWS_289,
            CKV_AWS_290,
            CKV_AWS_300,
            CKV_AWS_305,
            CKV_AWS_310,
            CKV_AWS_338,
            CKV_AWS_355,
            CKV_AWS_374,
            CKV2_AWS_32,
            CKV2_AWS_34

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set -o pipefail
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -input=false \
            -out=tfplan.bin 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        if: always() && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/tfplan.bin
          retention-days: 7
