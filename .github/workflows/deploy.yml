name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: read

# Serializa runs de deploy contra o terraform state remoto (mesmo grupo do
# plan.yml — PR plan e push deploy não competem pelo lock DynamoDB).
# cancel-in-progress: false preserva runs em fila.
concurrency:
  group: terraform-state-collectors-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fiscal-digital'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # FOLLOW-UP: idem plan.yml — restaurar `npm ci` apos regen do lock.
        run: npm install --no-audit --no-fund

      - name: Build collectors
        run: npm run build

      - name: Bundle Lambdas
        # Loop sobre os workspaces presentes em collectors/*.
        # Bootstrap nao tem nenhum collector ainda — o for vira no-op.
        run: |
          shopt -s nullglob
          for dir in collectors/*/ ; do
            name=$(basename "$dir")
            echo "::group::bundle $name"
            npm run bundle --workspace="collectors/${name}" --if-present
            echo "::endgroup::"
          done

      - name: Zip Lambdas
        run: |
          shopt -s nullglob
          for dir in collectors/*/dist/ ; do
            name=$(basename "$(dirname "$dir")")
            if [ -f "${dir}index.js" ]; then
              zip -j "${dir}function.zip" "${dir}index.js"
              echo "zipped: ${name}"
            fi
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -var-file=environments/prod.tfvars -auto-approve

      - name: Deploy Lambda code
        # Loop sobre os zips gerados. Mapping dirname → Lambda function name
        # explicito porque os nomes das Lambdas em prod NAO seguem o padrao
        # `fiscal-digital-collector-${dirname}-prod`:
        #   - querido-diario → `fiscal-digital-collector-prod` (preservado do
        #     monorepo original; cutover α exige match bit-perfect)
        #   - supplier → `fiscal-digital-supplier-collector-prod` (criado novo)
        # Adicionar entry para cada novo collector no case statement abaixo.
        run: |
          shopt -s nullglob
          for zip in collectors/*/dist/function.zip ; do
            name=$(basename "$(dirname "$(dirname "$zip")")")
            case "$name" in
              querido-diario) fn="fiscal-digital-collector-prod" ;;
              supplier) fn="fiscal-digital-supplier-collector-prod" ;;
              *) fn="fiscal-digital-collector-${name}-prod" ;;
            esac
            echo "::group::deploy ${fn}"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file "fileb://${zip}" \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name "$fn" \
              --no-cli-pager
            VERSION=$(aws lambda publish-version \
              --function-name "$fn" \
              --no-cli-pager \
              --query Version --output text)
            aws lambda update-alias \
              --function-name "$fn" \
              --name prod \
              --function-version "$VERSION" \
              --no-cli-pager 2>/dev/null || \
            aws lambda create-alias \
              --function-name "$fn" \
              --name prod \
              --function-version "$VERSION" \
              --no-cli-pager
            echo "::endgroup::"
          done
